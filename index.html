<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CHILLAXY 社内共有ドキュメント</title>
<style>
  :root{ --navy:#091F42; --black:#242424; --white:#FFFFFF; --gray:#D3D3D3;
    --coral:#F5A1A1; --deep:#CC2055; --line:#E2E5EA;
    --A:24px; --A-half:12px; --A-q:6px; --A1_5:36px; --A2:48px; }
  *{box-sizing:border-box;}
  body{ margin:0; background:#EDEFF2; color:var(--black);
    font-family:system-ui,-apple-system,"Hiragino Sans","Noto Sans JP",sans-serif; line-height:1.8; }
  .page{ max-width:760px; margin:var(--A2) auto; background:var(--white); }
  header{ background:var(--navy); color:var(--white); padding:var(--A2); }
  header .kicker{ font-size:12px; letter-spacing:.18em; color:var(--coral); margin:0 0 var(--A-half); }
  header h1{ font-size:23px; margin:0; font-weight:800; }
  main{ padding:var(--A1_5) var(--A2) var(--A2); }
  .card{ display:block; text-decoration:none; color:inherit; border:1px solid var(--line);
    padding:var(--A); margin:0 0 var(--A-half); }
  .card:hover{ border-color:var(--navy); }
  .card .t{ font-size:16px; font-weight:800; color:var(--navy); }
  .card .d{ font-size:13.5px; color:#4a4f57; margin-top:var(--A-q); }
  .card .go{ color:var(--deep); font-size:13px; font-weight:700; margin-top:var(--A-q); }
  footer{ padding:var(--A) var(--A2) var(--A2); border-top:1px solid var(--line); color:#6b7178; font-size:12px; }
  @media (max-width:640px){ .page{ margin:0; } }
</style>
</head>
<body>
<div class="page">
<header>
  <p class="kicker">CHILLAXY</p>
  <h1>社内共有ドキュメント</h1>
</header>
<main>
  <a class="card" href="doc-sharing-proposal.html">
    <div class="t">社内ドキュメント共有のしくみ（ご相談）</div>
    <div class="d">レポート・計画書・指南書をリンクで見やすく共有するしくみの提案・相談。</div>
    <div class="go">開く →</div>
  </a>
  <a class="card" href="airregi-weekly-setup-guide.html">
    <div class="t">Airレジ週次レポート 自動反映 設置指南書</div>
    <div class="d">各店の週次レポートをAirレジ会計明細CSVから自動反映する仕組みの設置手順（稜也さん向け）。</div>
    <div class="go">開く →</div>
  </a>
</main>
<footer>CHILLAXY 社内共有ドキュメント ／ 公開でよい資料のみ掲載（機微情報は社内限定の手段で）</footer>
</div>
</body>
</html>
